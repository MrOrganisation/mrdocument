# Override file that swaps the Anthropic API adapter for the Claude Code CLI adapter.
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.claude-code.yaml up
#
# Prerequisites:
#   - CLAUDE_CODE_OAUTH_TOKEN set in environment or .env file
#     (run `claude setup-token` locally to generate one)

services:
  anthropic-adapter:
    build:
      context: .
      dockerfile: Dockerfile.claude-code-adapter
      cache_from:
        - localhost:5000/claude-code-adapter:latest
    image: claude-code-adapter:latest-custom
    environment:
      LOG_LEVEL: INFO
      CLI_TIMEOUT: 14400
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      start_period: 15s
