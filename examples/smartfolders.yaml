smart_folders:
  - name: invoices
    context: arbeit
    path: /home/user/Desktop/Invoices
    condition:
      field: "type"
      value: "Rechnung"

  - name: medical
    context: privat
    path: ./medical_docs
    condition:
      field: "type"
      value: "Arztbrief"

# Paths to recursively watch for per-directory smartfolder.yaml files.
# Each directory containing a smartfolder.yaml (case-insensitive) becomes
# a root smart folder with that directory as the symlink output path.
smartfolder_paths:
  - /home/user/Desktop/SmartFolders
  - ./custom_views
