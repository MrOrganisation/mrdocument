name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cache images
        run: |
          BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | tr '/' '-')
          for img in mrdocument-service mrdocument-watcher stt ocrmypdf anthropic-adapter mrdocument-db; do
            docker pull ghcr.io/mrorganisation/$img:latest-$BRANCH || docker pull ghcr.io/mrorganisation/$img:latest || true
          done

      - name: Push
        run: make push

  release:
    if: github.ref == 'refs/heads/main'
    needs: push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cache images
        run: |
          for img in mrdocument-service mrdocument-watcher stt ocrmypdf anthropic-adapter mrdocument-db; do
            docker pull ghcr.io/mrorganisation/$img:latest || true
          done

      - name: Release
        run: make release
