networks:
  mrdocument-test-net:
    driver: bridge

services:
  mrdocument-test:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    env_file:
      - .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    networks:
      - mrdocument-test-net
    volumes:
      - ./testdata:/data/testuser
      - ./logs:/var/log
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8080:8080"
