[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:postgresql]
command=/usr/lib/postgresql/17/bin/postgres -D /var/lib/postgresql/data -c listen_addresses=localhost
user=postgres
priority=10
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/%(program_name)s.log

[program:mock-backends]
command=gunicorn --bind 0.0.0.0:9000 --workers 2 --timeout 30 mock_backends:app
directory=/app/mock
priority=20
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/%(program_name)s.log

[program:mock-stt]
command=gunicorn --bind 0.0.0.0:8001 --workers 1 --timeout 60 mock_backends:stt_app
directory=/app/mock
priority=20
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/%(program_name)s.log

[program:mrdocument-service]
command=python -m mrdocument.server
directory=/app/service
priority=30
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/%(program_name)s.log
environment=PYTHONPATH="/app/service",OCR_URL="http://localhost:9000",ANTHROPIC_BASE_URL="http://localhost:9000",ANTHROPIC_API_KEY="mock-key",ANTHROPIC_MODEL="mock-model"

[program:watcher-v2]
command=python3 app.py
directory=/app/watcher
priority=40
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/%(program_name)s.log
