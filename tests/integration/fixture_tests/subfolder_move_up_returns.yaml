contexts:
  - arbeit
files:
  - filename: arbeit_vertrag_fischer.pdf
    path_of_generated_file: generated/arbeit_vertrag_fischer.pdf
timeout: 15s
steps:
  # Step 1: Process via incoming → processed with sender "Fischer AG"
  - input:
      - incoming/arbeit_vertrag_fischer.pdf
    expected:
      - 'archive/arbeit_vertrag_fischer\.pdf'
      - 'processed/arbeit-.*2025-06-01.*fischer.*\.pdf'
  # Step 2: Move to reviewed → sorted/arbeit/Fischer AG/
  - input:
      - move: 'processed/arbeit-.*2025-06-01.*fischer.*\.pdf'
        to: 'reviewed/'
    expected:
      - 'archive/arbeit_vertrag_fischer\.pdf'
      - 'sorted/arbeit/Fischer AG/arbeit-.*2025-06-01.*fischer.*\.pdf'
  # Step 3: Move file "up" to sorted/arbeit/ (without sender subfolder).
  # The watcher should move it back to sorted/arbeit/Fischer AG/ based
  # on existing metadata rather than clearing the sender field.
  - input:
      - move: 'sorted/arbeit/Fischer AG/arbeit-.*2025-06-01.*\.pdf'
        to: 'sorted/arbeit/'
    expected:
      - 'archive/arbeit_vertrag_fischer\.pdf'
      - 'sorted/arbeit/Fischer AG/arbeit-.*2025-06-01.*fischer.*\.pdf'
