contexts:
  - privat
files:
  - filename: privat_kontoauszug_sparkasse.rtf
    path_of_generated_file: generated/privat_kontoauszug_sparkasse.rtf
timeout: 300s
steps:
  # Step 1: incoming → processed + archive
  - input:
      - incoming/privat_kontoauszug_sparkasse.rtf
    expected:
      - 'archive/privat_kontoauszug_sparkasse\.rtf'
      - 'processed/privat-.*2025-11-30.*\.pdf'
  # Step 2: move processed to reviewed → sorted
  - input:
      - move: 'processed/privat-.*2025-11-30.*\.pdf'
        to: 'reviewed/'
    expected:
      - 'archive/privat_kontoauszug_sparkasse\.rtf'
      - 'sorted/privat/Kontoauszug/privat-.*2025-11-30.*\.pdf'
