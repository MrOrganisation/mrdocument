contexts:
  - privat
files:
  - filename: privat_kontoauszug_sparkasse.txt
    path_of_generated_file: generated/privat_kontoauszug_sparkasse.txt
timeout: 300s
steps:
  # Step 1: incoming -> processed + archive
  - input:
      - incoming/privat_kontoauszug_sparkasse.txt
    expected:
      - 'archive/privat_kontoauszug_sparkasse\.txt'
      - 'processed/privat-.*2025-11-30.*\.txt'
  # Step 2: move to reviewed -> sorted
  - input:
      - move: 'processed/privat-.*2025-11-30.*\.txt'
        to: 'reviewed/'
    expected:
      - 'archive/privat_kontoauszug_sparkasse\.txt'
      - 'sorted/privat/Sparkasse/privat-.*2025-11-30.*\.txt'
  # Step 3: external DB change — mark for deletion (simulates Directus edit)
  - input:
      - sql: "UPDATE mrdocument.documents_v2 SET state = 'needs_deletion' WHERE original_filename = 'privat_kontoauszug_sparkasse.txt'"
    expected:
      - 'void/{CURRENT_DATE}/archive/privat_kontoauszug_sparkasse\.txt'
      - 'void/{CURRENT_DATE}/sorted/privat/Sparkasse/privat-.*2025-11-30.*\.txt'
