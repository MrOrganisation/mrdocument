contexts:
  - privat
files:
  - filename: privat_versicherung_allianz.pdf
    path_of_generated_file: generated/privat_versicherung_allianz.pdf
timeout: 300s
steps:
  # Step 1: incoming -> processed + archive
  - input:
      - incoming/privat_versicherung_allianz.pdf
    expected:
      - 'archive/privat_versicherung_allianz\.pdf'
      - 'processed/privat-.*2025-07-22.*\.pdf'
  # Step 2: move to reviewed -> sorted
  - input:
      - move: 'processed/privat-.*2025-07-22.*\.pdf'
        to: 'reviewed/'
    expected:
      - 'archive/privat_versicherung_allianz\.pdf'
      - 'sorted/privat/Allianz/privat-.*2025-07-22.*\.pdf'
  # Step 3: external DB change — reset record for reprocessing
  #   Clears classification fields so step2 reconcile reprocesses the document.
  - input:
      - sql: >-
          UPDATE mrdocument.documents_v2
          SET state = 'is_new',
              assigned_filename = NULL,
              hash = NULL,
              output_filename = NULL,
              metadata = NULL,
              context = NULL
          WHERE original_filename = 'privat_versicherung_allianz.pdf'
    expected:
      - 'archive/privat_versicherung_allianz\.pdf'
      - 'processed/privat-.*2025-07-22.*\.pdf'
      - '~void/{CURRENT_DATE}/sorted/.*'
