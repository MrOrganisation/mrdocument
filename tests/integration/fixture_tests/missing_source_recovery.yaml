contexts:
  - arbeit
  - privat
files:
  - filename: missing_recovery_doc.txt
    content: "Test document for missing source recovery. Unique: yaml-fixture-missing-recovery-7x9k"
timeout: 15s
steps:
  # Step 1: Process through incoming
  - input:
      - incoming/missing_recovery_doc.txt
    expected:
      - 'archive/missing_recovery_doc\.txt'
      - 'processed/privat-.*2025-12-15.*\.txt'
  # Step 2: Move to reviewed → sorted
  - input:
      - move: 'processed/privat-.*2025-12-15.*\.txt'
        to: 'reviewed/'
    expected:
      - 'archive/missing_recovery_doc\.txt'
      - 'sorted/privat/.*/privat-.*2025-12-15.*\.txt'
  # Step 3: Delete from sorted → source moves to missing
  - input:
      - delete: 'sorted/privat/.*/privat-.*2025-12-15.*\.txt'
    expected:
      - 'missing/.*missing_recovery_doc.*'
  # Step 4: Re-add the original file via incoming.
  # The watcher matches by source_hash, detects the record is IsMissing,
  # reprocesses, and the source should end up back in archive/.
  # The old copy in missing/ is moved to void/.
  - input:
      - incoming/missing_recovery_doc.txt
    expected:
      - 'archive/missing_recovery_doc\.txt'
      - 'processed/privat-.*2025-12-15.*\.txt'
      - '~missing/missing_recovery_doc\.txt'
