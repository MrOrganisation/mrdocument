networks:
  mrdocument-test-net:
    driver: bridge

services:
  mock-anthropic:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile.mock-anthropic
    networks:
      - mrdocument-test-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-elevenlabs:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile.mock-elevenlabs
    networks:
      - mrdocument-test-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-ocr:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile.mock-ocr
    networks:
      - mrdocument-test-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  mrdocument-db:
    image: postgres:17-alpine
    networks:
      - mrdocument-test-net
    environment:
      POSTGRES_DB: mrdocument
      POSTGRES_USER: mrdocument
      POSTGRES_PASSWORD: mrdocument
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrdocument"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 5

  stt:
    build:
      context: ../..
      dockerfile: Dockerfile.stt
    networks:
      - mrdocument-test-net
    environment:
      ELEVENLABS_BASE_URL: http://mock-elevenlabs:8080/v1
      ELEVENLABS_API_KEY: mock-key
    ports:
      - "127.0.0.1:8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      mock-elevenlabs:
        condition: service_healthy

  mrdocument-service:
    build:
      context: ../..
      dockerfile: Dockerfile.service-rs
    networks:
      - mrdocument-test-net
    environment:
      OCR_URL: http://mock-ocr:5000
      ANTHROPIC_BASE_URL: http://mock-anthropic:8080
      ANTHROPIC_API_KEY: mock-key
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./costs:/costs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      start_period: 15s
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      mock-anthropic:
        condition: service_healthy
      mock-ocr:
        condition: service_healthy

  mcp-server:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp-server
    networks:
      - mrdocument-test-net
    environment:
      DATABASE_HOST: mrdocument-db
      DATABASE_PORT: 5432
      DATABASE_NAME: mrdocument
      SYNC_ROOT: /sync
      MCP_PORT: 8091
      MCP_SUBDIR: ""
      LOG_LEVEL: DEBUG
    volumes:
      - ./testdata:/sync/testuser
    ports:
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      mrdocument-db:
        condition: service_healthy

  mrdocument-watcher:
    build:
      context: ../..
      dockerfile: Dockerfile.watcher
    networks:
      - mrdocument-test-net
    environment:
      MRDOCUMENT_URL: http://mrdocument-service:8000
      STT_URL: http://stt:8000
      DATABASE_URL: postgresql://mrdocument:mrdocument@mrdocument-db:5432/mrdocument
      OCR_LANGUAGE: deu+eng
      HEALTH_PORT: 8080
      WATCHER_CONFIG: /app/watcher.yaml
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./testdata:/sync/testuser
      - ./watcher-fast.yaml:/app/watcher.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mrdocument-service:
        condition: service_healthy
      stt:
        condition: service_healthy
      mrdocument-db:
        condition: service_healthy
