# Standalone compose for testing the claude-code-adapter in isolation.
# Exposes port 8080 on localhost so the pytest suite can reach it.

services:
  claude-code-adapter:
    build:
      context: ../..
      dockerfile: Dockerfile.claude-code-adapter
    container_name: test-claude-code-adapter
    environment:
      LOG_LEVEL: INFO
      CLI_TIMEOUT: 14400
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 3
